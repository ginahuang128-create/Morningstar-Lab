<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Morningstar ｜ 見習仙子的魔法傳送門</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Noto+Serif+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#0A0A0A;
  --void-2:#151515;
  --void-3:#1C1C1C;
  --glass:#181818;
  --gold-1:#EAD3A0;
  --gold-2:#CBA463;
  --gold-3:#8F6E3F;
  --parchment:#EAE1CE;
  --parchment-soft:rgba(234,225,206,0.72);
  --line: rgba(203,164,99,0.35);
  --serif: 'Cormorant Garamond','Noto Serif TC',serif;
  --serif-tc:'Noto Serif TC',serif;
}

*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }

body{
  min-height:100vh;
  font-family: var(--serif-tc);
  background:
    radial-gradient(ellipse at 15% -10%, rgba(203,164,99,0.12) 0%, transparent 45%),
    radial-gradient(ellipse at 100% 15%, rgba(203,164,99,0.07) 0%, transparent 42%),
    radial-gradient(ellipse at 50% 100%, rgba(203,164,99,0.06) 0%, transparent 50%),
    var(--void);
  background-attachment:fixed;
  position:relative;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  padding: 0 0 40px;
}

/* ---------- 模糊光暈 ---------- */
.glow-orb{ position:fixed; border-radius:50%; pointer-events:none; z-index:0; filter:blur(80px); }
.glow-orb.g1{ width:280px; height:280px; top:-70px; left:-90px; background:rgba(203,164,99,0.16); }
.glow-orb.g2{ width:240px; height:240px; top:38%; right:-100px; background:rgba(203,164,99,0.10); }
.glow-orb.g3{ width:260px; height:260px; bottom:-70px; left:15%; background:rgba(234,211,160,0.10); }

/* ---------- 全域顆粒質感 ---------- */
.grain-overlay{
  position:fixed; inset:0; z-index:5; pointer-events:none;
  background-image:url("data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='180' height='180'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:180px 180px;
  mix-blend-mode:overlay;
  opacity:.35;
}

/* ---------- 外層星空裝飾 ---------- */
.cosmic-bg{ position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
.star-dot{ position:absolute; top:0; left:0; width:1.5px; height:1.5px; border-radius:50%; background:transparent; }
.star-dot.a{ animation: twinkle 5s ease-in-out infinite; opacity:.5; }
.star-dot.b{ animation: twinkle 6.5s ease-in-out infinite .7s; opacity:.7; }
.star-dot.c{ animation: twinkle 4s ease-in-out infinite 1.4s; opacity:.9; }
@keyframes twinkle{ 0%,100%{opacity:.3;} 50%{opacity:1;} }

.hidden{ display:none !important; }

/* ---------- 版面容器 ---------- */
.page{ position:relative; z-index:1; max-width:450px; margin:0 auto; }

/* ============================================================
   統一「篇章」系統：不再用一格一格獨立卡片，
   改為連續的深色卷軸，段落間用細線＋符徽分隔（signature divider）
   ============================================================ */
.section{ position:relative; padding: 8px 28px 56px; }

.section:not(:first-child)::before{
  content:'';
  display:block;
  height:16px;
  margin: 4px 0 40px;
  background-image:
    linear-gradient(90deg, transparent, var(--line) 42%, transparent 47%),
    linear-gradient(90deg, transparent 53%, var(--line) 58%, transparent),
    radial-gradient(circle, var(--gold-1), var(--gold-3) 65%, transparent 72%);
  background-repeat:no-repeat;
  background-size: 42% 1px, 42% 1px, 7px 7px;
  background-position: left center, right center, center center;
  opacity:.9;
}

.section-eyebrow{
  display:block; text-align:center;
  font-size:10.5px; letter-spacing:4px; text-transform:uppercase;
  color:var(--gold-3); margin: 0 0 10px; font-weight:600;
}
.section-title{
  font-family:var(--serif); font-weight:700; font-style:italic;
  font-size:25px; color:var(--gold-1); text-align:center;
  margin:0 0 12px; letter-spacing:.4px;
  text-shadow: 0 0 22px rgba(203,164,99,.35);
}
.section-sub{
  font-size:13.5px; line-height:1.9; color:var(--parchment-soft);
  text-align:center; margin: 0 auto 22px; max-width:300px; letter-spacing:.2px;
}

/* ============================================================
   卷首：品牌印記（Hero）— 有機水滴形頭像，非方框
   ============================================================ */
.section-hero{ text-align:center; padding-top:50px; position:relative; }

.rune-spark{
  position:absolute; width:4px; height:4px; border-radius:50%;
  background:var(--gold-1); box-shadow:0 0 10px 2px rgba(234,211,160,.65);
  animation: twinkle 4s ease-in-out infinite;
}
.rune-spark.rs1{ top:70px; left:16%; }
.rune-spark.rs2{ top:190px; right:14%; animation-delay:1.3s; }

.avatar-wrap{
  width:186px; height:186px; margin:0 auto; position:relative;
  border-radius: 42% 58% 63% 37% / 45% 41% 59% 55%;
  overflow:hidden;
  animation: morph 11s ease-in-out infinite, breathe 4.4s ease-in-out infinite;
  box-shadow: 0 0 0 3px rgba(203,164,99,.55), 0 10px 40px rgba(0,0,0,.5);
}
.avatar-wrap::after{
  content:''; position:absolute; inset:0;
  box-shadow: inset 0 -14px 22px rgba(0,0,0,.4), inset 0 10px 16px rgba(255,255,255,.08);
}
@keyframes morph{
  0%,100%{ border-radius: 42% 58% 63% 37% / 45% 41% 59% 55%; }
  50%{ border-radius: 58% 42% 38% 62% / 55% 60% 40% 45%; }
}
@keyframes breathe{
  0%,100%{ box-shadow: 0 0 0 3px rgba(203,164,99,.45), 0 10px 32px rgba(0,0,0,.45); }
  50%{ box-shadow: 0 0 0 3px rgba(203,164,99,.75), 0 10px 46px rgba(203,164,99,.35); }
}
.avatar-img{ width:100%; height:100%; object-fit:cover; display:block; background:var(--void-2); }

.brand-row{ margin-top:-10px; position:relative; z-index:2; }
.brand-title{
  font-family:var(--serif); font-weight:600; font-style:italic;
  font-size:35px; letter-spacing:1px; color:var(--gold-1); margin:0;
  text-shadow: 0 0 20px rgba(203,164,99,.4);
}
.brand-sub{
  font-size:12.5px; letter-spacing:4px; color:var(--gold-3);
  margin: 6px 0 22px; text-transform:uppercase;
}
.tagline{
  font-family:var(--serif); font-style:italic; font-size:15px; line-height:1.95;
  color:var(--parchment-soft); letter-spacing:.4px; margin:0 auto; max-width:290px;
}

.card-dark-star{ position:absolute; width:1.5px; height:1.5px; border-radius:50%; background:transparent; }
.card-dark-star.a{ opacity:.6; }
.card-dark-star.b{ opacity:.85; }

/* ============================================================
   仙子近況 — 信箋式清單，非白色圓角按鈕格
   ============================================================ */
.news-banner{
  text-decoration:none; display:flex; align-items:center; gap:14px;
  padding:16px 18px 16px 20px; margin-bottom:13px; position:relative;
  background: rgba(24,24,24,.55);
  border:1px solid rgba(203,164,99,0.22);
  border-radius: 4px 20px 4px 20px;
  backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  overflow:hidden;
  transition: transform .4s cubic-bezier(.2,.8,.2,1), box-shadow .4s ease, border-color .4s ease;
}
.news-banner::before{
  content:''; position:absolute; left:0; top:10%; bottom:10%; width:2.5px;
  background: var(--gold-2);
}
.news-banner:last-child{ margin-bottom:0; }
.news-banner:hover{
  transform: translateX(5px) translateY(-2px);
  border-color: var(--gold-2);
  box-shadow: 0 14px 30px rgba(0,0,0,.4), 0 0 22px rgba(203,164,99,.15);
}
.news-banner .nb-body{ flex:1 1 auto; min-width:0; }
.news-banner .nb-tag{
  font-size:10.5px; letter-spacing:1.8px; color:var(--gold-2);
  display:block; margin-bottom:4px; font-weight:600; opacity:.9; text-transform:uppercase;
}
.news-banner .nb-text{
  font-size:13.5px; color:var(--parchment); font-weight:600; line-height:1.4;
  overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
}

/* ============================================================
   共用：想讓人點下去的按鈕（單色暗底金框，呼應符文圓球質感）
   套用於 nb-pill / gem-btn / service-btn
   ============================================================ */
.nb-pill, .gem-btn, .service-btn{
  position:relative; display:inline-block; text-decoration:none;
  background: var(--void-3);
  color: var(--gold-1); font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
  border:1px solid rgba(203,164,99,.5);
  box-shadow:
    inset 0 2px 3px rgba(255,255,255,.05),
    inset 0 -10px 16px rgba(0,0,0,.5),
    0 8px 20px rgba(0,0,0,.45);
  transition: transform .3s cubic-bezier(.2,.8,.2,1), box-shadow .3s ease, border-color .3s ease, background .3s ease;
}
.nb-pill:hover, .gem-btn:hover, .service-btn:hover{
  transform: translateY(-3px);
  border-color: var(--gold-1);
  background: rgba(203,164,99,.08);
  box-shadow:
    inset 0 2px 3px rgba(255,255,255,.08),
    inset 0 -10px 16px rgba(0,0,0,.4),
    0 12px 26px rgba(0,0,0,.5),
    0 0 20px rgba(203,164,99,.3);
}
.nb-pill:active, .gem-btn:active, .service-btn:active{
  transform: translateY(-1px);
  box-shadow:
    inset 0 2px 3px rgba(255,255,255,.05),
    inset 0 -4px 8px rgba(0,0,0,.5),
    0 4px 10px rgba(0,0,0,.5);
}
.nb-pill{ flex:0 0 auto; font-size:11px; padding:9px 18px; border-radius:999px; }
.gem-btn{ font-size:12.5px; padding:13px 26px; border-radius:24px; }
.service-btn{ display:block; text-align:center; padding:14px; border-radius:26px; margin-top:8px; font-size:12.5px; }

/* ============================================================
   尋光指引 — 符文錯落排列，暗色玻璃指引卡（非白色方框）
   ============================================================ */
.gem-row{ display:flex; justify-content:center; align-items:flex-end; gap:30px; margin: 8px 0 26px; position:relative; }
.gem-item{ text-align:center; cursor:pointer; position:relative; z-index:1; }
.gem-item:nth-child(2){ transform: translateY(-14px); }
.gem-item:nth-child(3){ transform: translateY(5px); }
.gem-item:nth-child(3n+1):nth-child(n+4){ transform: translateY(-6px); }
.gem-circle{
  width:76px; height:76px; border-radius:50%; margin:0 auto; position:relative;
  background: var(--void-3);
  border:1px solid rgba(203,164,99,.45);
  box-shadow:
    inset 0 2px 3px rgba(255,255,255,.06),
    inset 0 -8px 14px rgba(0,0,0,.55),
    0 8px 20px rgba(0,0,0,.5);
  transition: transform .5s cubic-bezier(.2,.8,.2,1), box-shadow .4s ease, border-color .4s ease;
  display:flex; align-items:center; justify-content:center;
}
.gem-item:hover .gem-circle{ transform: translateY(-4px); border-color: rgba(234,211,160,.65); }
.gem-item.active .gem-circle{
  transform: scale(1.12);
  border-color: var(--gold-1);
  box-shadow:
    inset 0 2px 3px rgba(255,255,255,.1),
    inset 0 -8px 14px rgba(0,0,0,.45),
    0 0 22px rgba(203,164,99,.5);
}
.gem-icon{ width:34px; height:34px; opacity:.5; transform:scale(.9); transition: opacity .35s ease, transform .35s ease, color .35s ease; color:var(--gold-3); }
.gem-item:hover .gem-icon{ opacity:.75; color:var(--gold-2); }
.gem-item.active .gem-icon{ opacity:1; transform:scale(1); color:var(--gold-1); }
.gem-icon svg{ width:100%; height:100%; display:block; }

.gem-panel{ max-height:0; overflow:hidden; opacity:0; transition: max-height .5s ease, opacity .4s ease, margin .4s ease; }
.gem-panel.show{ max-height:520px; opacity:1; margin-bottom:6px; }
.gem-panel-inner{
  background: rgba(14,14,14,.88);
  border:1px solid rgba(203,164,99,.3);
  border-radius: 6px 26px 6px 26px;
  padding: 26px 22px; text-align:center;
  backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
  box-shadow: 0 18px 44px rgba(0,0,0,.45);
}
.gem-name-tag{
  display:inline-block; font-size:11.5px; font-weight:700; letter-spacing:2px; text-transform:uppercase;
  color:var(--gold-2); margin-bottom:10px;
}
.gem-quote{
  font-family:var(--serif); font-style:italic; font-weight:600;
  font-size:18px; color:var(--gold-1); line-height:1.6; margin:0 0 12px;
}
.gem-guidance{ font-size:14px; line-height:1.9; color:var(--parchment-soft); margin:0 0 18px; }

/* ============================================================
   魔法聊天室 — tabs ＋ 方案（不對稱玻璃卡，蠟封角標）
   ============================================================ */
.tabs{ display:flex; justify-content:center; gap:6px; margin: 4px 0 24px; }
.tab-btn{
  background:transparent; border:none; cursor:pointer;
  font-family:var(--serif-tc); font-size:14px; letter-spacing:.5px;
  color:var(--parchment-soft); padding:9px 16px 11px; position:relative;
  transition: color .3s ease;
}
.tab-btn::after{
  content:''; position:absolute; left:50%; bottom:0; width:0; height:2px;
  transform:translateX(-50%);
  background: var(--gold-2);
  transition: width .35s ease;
}
.tab-btn.active{ color: var(--gold-1); font-weight:700; }
.tab-btn.active::after{ width:60%; }

.service-panel{ display:none; flex-direction:column; gap:22px; }
.service-panel.active{ display:flex; }

.service-card{
  position:relative;
  background: rgba(14,14,14,.9);
  border-radius: 8px 30px 8px 30px;
  overflow:visible;
  border:1px solid rgba(203,164,99,.22);
  box-shadow: 0 14px 34px rgba(0,0,0,.4);
  transition: box-shadow .35s ease, border-color .35s ease, transform .35s ease;
  padding-top:16px;
}
.service-card:hover{
  box-shadow: 0 22px 46px rgba(0,0,0,.5), 0 0 26px rgba(203,164,99,.18);
  border-color: rgba(203,164,99,.5);
  transform: translateY(-3px);
}
.service-img-wrap{ width:108px; height:108px; margin: -30px auto 6px; position:relative; }
.service-img-wrap:empty{ display:none; margin:0; }
.service-img{
  width:100%; height:100%; object-fit:cover; display:block;
  border-radius: 46% 54% 58% 42% / 50% 46% 54% 50%;
  border:3px solid var(--void-2);
  box-shadow: 0 0 0 2px rgba(203,164,99,.5), 0 12px 26px rgba(0,0,0,.45);
}
.service-body{ padding: 6px 22px 24px; text-align:center; }
.service-badge{
  display:inline-block; font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
  color:var(--gold-2); background:rgba(203,164,99,.1); border:1px solid rgba(203,164,99,.28);
  padding:4px 12px; border-radius:999px; margin-bottom:10px;
}
.service-name{
  font-family:var(--serif); font-size:20px; font-weight:700; color:var(--gold-1);
  margin:0 0 10px; letter-spacing:.3px;
}
.service-desc{ font-size:13.5px; line-height:1.85; color:var(--parchment-soft); margin:0 0 8px; }
.service-note{ font-size:11.5px; color:rgba(234,225,206,.5); line-height:1.75; margin:0 0 4px; }

/* ============================================================
   底部
   ============================================================ */
.footer{
  text-align:center; padding: 24px 0 2px; color:var(--parchment-soft);
  font-family:var(--serif); font-style:italic;
  font-size:12.5px; letter-spacing:.5px; line-height:1.8;
}
.footer::before{
  content:''; display:block; width:40px; height:1px; margin:0 auto 16px;
  background: var(--line);
}

.loading-text{ text-align:center; color:var(--parchment-soft); font-size:12.5px; padding:14px 0; }

@media (max-width:360px){
  .brand-title{ font-size:30px; }
  .gem-row{ gap:18px; }
  .gem-circle{ width:66px; height:66px; }
  .section{ padding:8px 20px 48px; }
}
</style>
</head>
<body>

<div class="cosmic-bg" id="cosmicBg"></div>
<div class="glow-orb g1"></div>
<div class="glow-orb g2"></div>
<div class="glow-orb g3"></div>
<div class="grain-overlay"></div>

<div class="page">

  <!-- ============ 卷首：品牌印記（Hero） ============ -->
  <div class="section section-hero" id="heroDark">
    <span class="rune-spark rs1"></span>
    <span class="rune-spark rs2"></span>

    <div class="avatar-wrap">
      <img class="avatar-img" id="avatarImg" src="https://images.unsplash.com/photo-1518709268805-4e9042af2176?w=300&h=300&fit=crop" alt="頭像">
    </div>

    <div class="brand-row">
      <h1 class="brand-title">Morningstar</h1>
      <p class="brand-sub">見習仙子++</p>
    </div>

    <p class="tagline">
      靈感・女巫符文・水晶・魔法儀式<br>
      願你記得，你就是光
    </p>
  </div>

  <!-- ============ 仙子近況 ============ -->
  <div class="section section-news hidden" id="newsSection">
    <span class="section-eyebrow">Fairy Updates</span>
    <h2 class="section-title">仙子近況</h2>
    <p class="section-sub">看看最近有什麼好玩的魔法限定活動？錯過就敲不到囉！</p>
    <div id="newsList"></div>
  </div>

  <!-- ============ 尋光指引 ============ -->
  <div class="section section-guide" id="guideSection">
    <span class="section-eyebrow">Guidance</span>
    <h2 class="section-title">尋光指引</h2>
    <p class="section-sub">心裡總覺得卡卡的？選一顆命定符文，偷偷看宇宙送你的突破指引</p>
    <div class="gem-row" id="gemRow"></div>
    <div class="gem-panel" id="gemPanel">
      <div class="gem-panel-inner" id="gemPanelInner"></div>
    </div>
  </div>

  <!-- ============ 魔法聊天室 ============ -->
  <div class="section section-service" id="serviceSection">
    <span class="section-eyebrow">Sanctuary</span>
    <h2 class="section-title">魔法聊天室</h2>
    <p class="section-sub">按下傳送鍵，把你的心事打包交給見習仙子吧</p>
    <div class="tabs" id="tabsRow"></div>
    <div id="panelsWrap"></div>
    <div class="footer">© Morningstar．願你記得，你就是光</div>
  </div>

</div>

<script>
/* ============================================================
   ▍設定區
   將下方 SPREADSHEET_ID 換成你的 Google Sheet ID
   （網址 https://docs.google.com/spreadsheets/d/【這一段】/edit）
   並將該 Sheet 設為「知道連結的人皆可檢視」

   ▍工作表欄位規劃：

   1) profile 工作表（僅用來放「仙子近況」橫幅，品牌文字已寫死於 HTML）
      category   | title        | url
      仙子近況    | 活動標題      | 連結
      （無資料則此卡片自動隱藏）

   2) quiz 工作表（可覆蓋預設的「尋光指引」三張符文，欄位如下；留空則使用內建預設文案）
      symbol(star/scythe/waves) | name | quote | guidance_text | button_text | button_url

   3) services 工作表（可覆蓋預設方案，欄位如下；留空則使用內建預設方案）
      tab(線上諮詢/實體面談) | badge | name | description | note | image_url | button_text | button_url
   ============================================================ */

const SPREADSHEET_ID = '1XXX71bkr3bEgAD9lBuLHFgmy68Qp3qh26llyEUV0xxI';

/* 【選用】Google Apps Script 網頁應用程式網址（結尾為 /exec）
   若有填寫，會優先使用 Apps Script 讀取資料（較穩定、Sheet 也可設為不公開）；
   留空則沿用原本的公開連結（gviz）讀取方式。
   取得方式請參考另外提供的 Code.gs 及部署說明。 */
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxUua6sZnlAFfziImZkPQloh_l8aDmZeAU4hW19GfXQmdQzOcF7-zpr0EyN8LZIJMEwZg/exec';

/* 自動更新頻率（秒）。設為 0 代表關閉自動更新，只有重新整理頁面才會抓新資料。 */
const AUTO_REFRESH_SECONDS = 60;

/* 頭像圖片網址（可自行替換，或改由 profile 工作表擴充讀取） */
const AVATAR_URL = 'https://i.meee.com.tw/hs44NV5.jpg';

/* Instagram 私訊／直播小盒子連結
   請自行填入你的帳號，例如：
   'https://instagram.com/direct/inbox/'  或
   'https://m.me/morningstar.lab'
   【尋光指引】翻牌指引按鈕、【魔法聊天室】所有方案卡片按鈕，
   只要 Google Sheet 沒有另外填 button_url，就會統一導向這裡。 */

/* ---------- 星空粒子（純 CSS box-shadow） ---------- */
(function initStars(){
  function genShadow(count, area, color){
    let arr = [];
    for(let i=0;i<count;i++){
      arr.push(`${Math.floor(Math.random()*area)}px ${Math.floor(Math.random()*area)}px ${color}`);
    }
    return arr.join(',');
  }
  const style = document.createElement('style');
  style.textContent = `
    .star-dot.a{ box-shadow:${genShadow(55,1400,'#DFC79A')}; }
    .star-dot.b{ box-shadow:${genShadow(34,1400,'#FFFFFF')}; }
    .star-dot.c{ box-shadow:${genShadow(16,1400,'#B4915C')}; }
    .card-dark-star.a{ box-shadow:${genShadow(20,300,'#DFC79A')}; }
    .card-dark-star.b{ box-shadow:${genShadow(10,300,'#FFFFFF')}; }
  `;
  document.head.appendChild(style);
  const bg = document.getElementById('cosmicBg');
  ['a','b','c'].forEach(cls=>{
    const el = document.createElement('div');
    el.className = 'star-dot '+cls;
    bg.appendChild(el);
  });
  const hero = document.getElementById('heroDark');
  ['a','b'].forEach(cls=>{
    const el = document.createElement('div');
    el.className = 'card-dark-star '+cls;
    hero.insertBefore(el, hero.firstChild);
  });
})();

/* ---------- Google Sheet 讀取 ---------- */
async function fetchSheet(sheetName){
  try{
    if(APPS_SCRIPT_URL){
      const res = await fetch(`${APPS_SCRIPT_URL}?sheet=${encodeURIComponent(sheetName)}`);
      const data = await res.json();
      return Array.isArray(data) ? data : null;
    }
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
    const res = await fetch(url);
    const raw = await res.text();
    const jsonStr = raw.substring(raw.indexOf('{'), raw.lastIndexOf('}')+1);
    const data = JSON.parse(jsonStr);
    const cols = data.table.cols.map((c,i)=> (c.label || c.id || ('col'+i)).toString().trim());
    return data.table.rows.map(r=>{
      const obj = {};
      cols.forEach((col,i)=>{
        const cell = r.c[i];
        obj[col] = cell ? (cell.v ?? '') : '';
      });
      return obj;
    });
  }catch(err){
    console.warn(`[Sheet:${sheetName}] 讀取失敗或尚未設定`, err);
    return null;
  }
}

/* ---------- 渲染：仙子近況 ---------- */
function renderNews(rows){
  const section = document.getElementById('newsSection');
  const list = document.getElementById('newsList');
  list.innerHTML = '';
  /* rows === null 代表 Sheet 尚未設定或讀取失敗 → 用示範資料預覽
     rows 是陣列（即使是空陣列）代表 Sheet 已連上，照真實資料走，沒有資料就自動隱藏 */
  const source = (rows === null) ? DEFAULT_NEWS : rows;
  const items = (source||[]).filter(r => (r.category||'').toString().trim() === '仙子近況');
  if(items.length === 0){ section.classList.add('hidden'); return; }
  section.classList.remove('hidden');
  items.forEach(it=>{
    const a = document.createElement('a');
    a.className = 'news-banner';
    a.href = it.url || '#';
    a.target = '_blank'; a.rel = 'noopener';
    a.innerHTML = `
      <span class="nb-body">
        <span class="nb-tag">仙子近況</span>
        <span class="nb-text">${it.title||''}</span>
      </span>
      <span class="nb-pill">查看</span>
    `;
    list.appendChild(a);
  });
}

/* ---------- 渲染：尋光指引（寶石） ---------- */
function renderGems(rows){
  const data = (rows && rows.length) ? rows : DEFAULT_QUIZ;
  const gemRow = document.getElementById('gemRow');
  const panel = document.getElementById('gemPanel');
  const panelInner = document.getElementById('gemPanelInner');
  gemRow.innerHTML = '';

  data.forEach((g, idx)=>{
    const symbolKey = (g.symbol||'star').toString().trim().toLowerCase();
    const icon = ICONS[symbolKey] || ICONS.star;
    const item = document.createElement('div');
    item.className = 'gem-item';
    item.innerHTML = `
      <div class="gem-circle">
        <div class="gem-icon">${icon}</div>
      </div>
    `;
    item.addEventListener('click', ()=>{
      const wasActive = item.classList.contains('active');
      gemRow.querySelectorAll('.gem-item').forEach(el=>el.classList.remove('active'));
      if(wasActive){
        panel.classList.remove('show');
        return;
      }
      item.classList.add('active');
      panelInner.innerHTML = `
        <div class="gem-name-tag">${g.name||''}</div>
        <div class="gem-quote">${g.quote||''}</div>
        <p class="gem-guidance">${g.guidance_text||''}</p>
        <a class="gem-btn" href="${g.button_url||IG_DM_URL}" target="_blank" rel="noopener">${g.button_text||'立即預約'}</a>
      `;
      panel.classList.add('show');
    });
    gemRow.appendChild(item);
  });
}

/* ---------- 渲染：魔法聊天室（方案） ---------- */
function renderServices(rows){
  const data = (rows && rows.length) ? rows : DEFAULT_SERVICES;
  const tabsWrap = document.getElementById('tabsRow');
  const panelsWrap = document.getElementById('panelsWrap');
  tabsWrap.innerHTML = ''; panelsWrap.innerHTML = '';

  const tabDefs = [
    { key:'線上諮詢', label:'線上諮詢' },
    { key:'實體面談', label:'實體面談' }
  ];

  tabDefs.forEach((t, idx)=>{
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx===0 ? ' active' : '');
    btn.textContent = t.label;
    btn.dataset.tab = t.key;
    btn.addEventListener('click', ()=> switchTab(t.key));
    tabsWrap.appendChild(btn);

    const panel = document.createElement('div');
    panel.className = 'service-panel' + (idx===0 ? ' active' : '');
    panel.dataset.panel = t.key;

    const items = data.filter(r => (r.tab||'').toString().trim() === t.key);
    if(items.length === 0){
      panel.innerHTML = `<p class="loading-text">此類型方案尚未開放，敬請期待</p>`;
    }else{
      items.forEach(sv=>{
        const card = document.createElement('div');
        card.className = 'service-card';
        card.innerHTML = `
          <div class="service-img-wrap">${sv.image_url ? `<img class="service-img" src="${sv.image_url}" alt="">` : ''}</div>
          <div class="service-body">
            <span class="service-badge">${sv.badge||''}</span>
            <h3 class="service-name">${sv.name||''}</h3>
            <p class="service-desc">${sv.description||''}</p>
            ${sv.note ? `<p class="service-note">${sv.note}</p>` : ''}
            <a class="service-btn" href="${sv.button_url||IG_DM_URL}" target="_blank" rel="noopener">${sv.button_text||'私訊預約仙子'}</a>
          </div>
        `;
        panel.appendChild(card);
      });
    }
    panelsWrap.appendChild(panel);
  });
}

function switchTab(key){
  document.querySelectorAll('.tab-btn').forEach(b=> b.classList.toggle('active', b.dataset.tab === key));
  document.querySelectorAll('.service-panel').forEach(p=> p.classList.toggle('active', p.dataset.panel === key));
}

/* ---------- 初始化 ---------- */
async function init(){
  const [profileRows, quizRows, serviceRows] = await Promise.all([
    fetchSheet('profile'),
    fetchSheet('quiz'),
    fetchSheet('services')
  ]);
  renderNews(profileRows);
  renderGems(quizRows);
  renderServices(serviceRows);
}
init();

/* 自動更新：每隔 AUTO_REFRESH_SECONDS 秒重新抓一次 Sheet 資料並更新畫面
   （若當下「尋光指引」或方案分頁有展開的內容，畫面會在這次更新時收合重置，
    屬正常現象，避免和使用者操作互相打架） */
if(AUTO_REFRESH_SECONDS > 0){
  setInterval(init, AUTO_REFRESH_SECONDS * 1000);
}
</script>
